name: Normalize Difficulty Folders

on:
  push:
    branches:
      - main

jobs:
  normalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize difficulty folder names
        env:
          COMMIT_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          python3 << 'EOF'
          import os
          import re
          import shutil
          from datetime import datetime, timezone

          ROOT = "."

          # Parse commit date → "2026-06-27"
          raw_ts = os.environ.get("COMMIT_DATE", "")
          try:
              dt       = datetime.fromisoformat(raw_ts.replace("Z", "+00:00"))
              DATE_STR = dt.strftime("%Y-%m-%d")
          except Exception:
              DATE_STR = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          print(f"Commit date: {DATE_STR}")

          # ── Classifiers ────────────────────────────────────────────────
          COLON_RE    = re.compile(r'^Difficulty\s*:\s*(.+)$')
          CONFLICT_RE = re.compile(r'^(Difficulty\s+\w+)_\d+$')
          AUTO_RE     = re.compile(r'^Difficulty\s+\w+_Auto$')
          CLEAN_RE    = re.compile(r'^Difficulty\s+\w+$')

          def base_level(name):
              m = COLON_RE.match(name)
              if m:
                  return m.group(1).strip()
              m = CONFLICT_RE.match(name)
              if m:
                  return m.group(1).replace("Difficulty ", "").strip()
              return None

          def move_into_auto(src_folder, auto_path, date_str):
              """
              Every problem folder gets _YYYY-MM-DD appended.
              Adding One to Array  →  Adding One to Array_2026-06-27
              """
              os.makedirs(auto_path, exist_ok=True)

              for item in os.listdir(src_folder):
                  src      = os.path.join(src_folder, item)
                  new_name = f"{item}_{date_str}"          # Always dated
                  dst      = os.path.join(auto_path, new_name)

                  # Guard: if same problem committed twice on same day
                  if os.path.exists(dst):
                      counter = 1
                      while os.path.exists(f"{dst}_{counter}"):
                          counter += 1
                      dst = f"{dst}_{counter}"
                      new_name = os.path.basename(dst)

                  shutil.move(src, dst)
                  print(f"    Moved: '{item}' → '{new_name}'")

          # ── Main logic ─────────────────────────────────────────────────
          changed = False

          for entry in sorted(os.listdir(ROOT)):
              full = os.path.join(ROOT, entry)
              if not os.path.isdir(full):
                  continue
              if not entry.startswith("Difficulty"):
                  continue

              # Already correct — leave alone
              if CLEAN_RE.match(entry) or AUTO_RE.match(entry):
                  continue

              level = base_level(entry)
              if level is None:
                  print(f"Skipping unrecognised: {entry}")
                  continue

              auto_folder = f"Difficulty {level}_Auto"
              auto_path   = os.path.join(ROOT, auto_folder)

              print(f"Routing '{entry}' → '{auto_folder}'")
              move_into_auto(full, auto_path, DATE_STR)

              remaining = os.listdir(full)
              if not remaining:
                  os.rmdir(full)
                  print(f"  Removed: {entry}")
                  changed = True
              else:
                  print(f"  Warning: '{entry}' still has items: {remaining}")

          if not changed:
              print("Nothing to normalize.")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: normalize GFG folders with date suffix [skip ci]"
            git push origin main
          fi
